name: Share a translated achievement schema
description: Upload a ZIP containing a localized Steam UserGameStatsSchema_*.bin file for review.
title: "[Translation contribution]: "
labels:
  - translation-contribution
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a Steam achievement translation file.

        Before submitting, check the human-readable library index at `achievement-library/README.md`, open pull requests, and open issues tagged `translation-contribution` for the same Steam app ID.
        GitHub issues do not accept `.bin` attachments directly. Put the original `UserGameStatsSchema_<game_id>.bin` file into a ZIP named `UserGameStatsSchema_<game_id>.zip`, then upload that ZIP. The ZIP must contain exactly one `.bin` file.
  - type: input
    id: game-name
    attributes:
      label: Game name
      description: The public Steam game name.
      placeholder: Game Name
    validations:
      required: true
  - type: input
    id: game-id
    attributes:
      label: Steam app ID
      description: The numeric Steam app ID from the store URL.
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store-url
    attributes:
      label: Steam store URL
      description: The Steam store page for this game.
      placeholder: https://store.steampowered.com/app/123456/Game_Name/
    validations:
      required: true
  - type: checkboxes
    id: languages
    attributes:
      label: Languages included in the uploaded file
      description: Select every Steam language code that is fully present in the uploaded file.
      options:
        - label: schinese - Simplified Chinese
        - label: tchinese - Traditional Chinese
        - label: japanese - Japanese
        - label: koreana - Korean
        - label: english - English
        - label: french - French
        - label: italian - Italian
        - label: german - German
        - label: spanish - Spanish (Spain)
        - label: latam - Spanish (Latin America)
        - label: russian - Russian
        - label: polish - Polish
        - label: portuguese - Portuguese
        - label: brazilian - Portuguese (Brazil)
        - label: turkish - Turkish
        - label: ukrainian - Ukrainian
        - label: czech - Czech
        - label: dutch - Dutch
        - label: swedish - Swedish
        - label: danish - Danish
        - label: finnish - Finnish
        - label: norwegian - Norwegian
        - label: hungarian - Hungarian
        - label: romanian - Romanian
        - label: greek - Greek
        - label: bulgarian - Bulgarian
        - label: thai - Thai
        - label: vietnamese - Vietnamese
        - label: indonesian - Indonesian
        - label: arabic - Arabic
    validations:
      required: true
  - type: input
    id: additional-languages
    attributes:
      label: Additional Steam language codes
      description: Optional comma-separated codes if the file contains a Steam language code not listed above.
      placeholder: "none"
    validations:
      required: false
  - type: textarea
    id: schema-file
    attributes:
      label: Achievement schema ZIP
      description: Drag and drop exactly one `UserGameStatsSchema_<game_id>.zip` file here. The ZIP must contain exactly one `UserGameStatsSchema_<game_id>.bin` file.
      placeholder: Attach UserGameStatsSchema_123456.zip
    validations:
      required: true
