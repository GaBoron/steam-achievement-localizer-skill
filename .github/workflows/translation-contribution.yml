name: Translation contribution review

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review:
    if: contains(github.event.issue.labels.*.name, 'translation-contribution')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare submission branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="translation-library/issue-$ISSUE_NUMBER"
          git fetch origin "$BRANCH" || true
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Validate submission and update library files
        id: validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python scripts/library_submission_bot.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN"

      - name: Comment on failed review
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -f submission_result.json ]; then
            python - <<'PY' > issue-comment.md
          import json
          from pathlib import Path
          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          print("Automatic first review did not pass.\n")
          for item in data.get("errors", []):
              print(f"- {item}")
          warnings = data.get("warnings", [])
          if warnings:
              print("\nWarnings:")
              for item in warnings:
                  print(f"- {item}")
          PY
          else
            printf "Automatic first review failed before a detailed report was created.\n" > issue-comment.md
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md

      - name: Create or update pull request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="$(python -c 'import json; print(json.load(open("submission_result.json", encoding="utf-8"))["branch"])')"
          PR_TITLE="$(cat pr_title.txt)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add achievement-library/README.md achievement-library/index.json achievement-library/files
          if git diff --cached --quiet; then
            echo "No library changes to commit."
          else
            git commit -m "data: add achievement translations from issue $ISSUE_NUMBER"
            git push --set-upstream origin "$BRANCH"
          fi
          PR_URL="$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create --title "$PR_TITLE" --body-file pr_body.md --base main --head "$BRANCH")"
          else
            gh pr edit "$PR_URL" --title "$PR_TITLE" --body-file pr_body.md
          fi
          printf "Automatic first review passed. A pull request is ready for maintainer review: %s\n" "$PR_URL" > issue-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
