name: Translation contribution review

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - reopened
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-guard:
    if: ${{ github.event_name == 'issues' && !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply issue labels and freeze translation submissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mode guard

  review:
    if: ${{ (github.event_name == 'issues' && github.event.action != 'edited' && !github.event.issue.pull_request && contains(github.event.issue.labels.*.name, 'translation-contribution')) || (github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.issue.labels.*.name, 'translation-contribution') && (startsWith(github.event.comment.body, '/update ') || github.event.comment.body == '/force-review' || startsWith(github.event.comment.body, '/force-review '))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Authorize maintainer override command
        id: force_auth
        if: ${{ github.event_name == 'issue_comment' && (github.event.comment.body == '/force-review' || startsWith(github.event.comment.body, '/force-review ')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mode require-maintainer-command --command /force-review

      - name: Prepare submission branch
        if: ${{ github.event_name != 'issue_comment' || (github.event.comment.body != '/force-review' && !startsWith(github.event.comment.body, '/force-review ')) || steps.force_auth.outputs.authorized == 'true' }}
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="translation-library/issue-$ISSUE_NUMBER"
          git fetch origin "$BRANCH" || true
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Validate submission and update library files
        id: validate
        if: ${{ github.event_name != 'issue_comment' || (github.event.comment.body != '/force-review' && !startsWith(github.event.comment.body, '/force-review ')) || steps.force_auth.outputs.authorized == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python scripts/library_submission_bot.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN"

      - name: Comment on failed review
        if: ${{ failure() && (github.event_name != 'issue_comment' || (github.event.comment.body != '/force-review' && !startsWith(github.event.comment.body, '/force-review ')) || steps.force_auth.outputs.authorized == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -f submission_result.json ]; then
            python - <<'PY' > issue-comment.md
          import json
          from pathlib import Path
          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          if data.get("retry_allowed"):
              print("Automatic first review found a file problem that can be updated.\n")
          else:
              print("Automatic first review cannot continue, so this issue will be closed.\n")
          for item in data.get("errors", []):
              print(f"- {item}")
          warnings = data.get("warnings", [])
          if warnings:
              print("\nWarnings:")
              for item in warnings:
                  print(f"- {item}")
          if data.get("retry_allowed"):
              print("\nThe original issue title and body are frozen after submission, but comments remain open. To replace the uploaded file, attach the corrected ZIP in a new comment and write `/update <attachment link>`.")
          PY
          else
            printf "Automatic first review failed before a detailed report was created.\n" > issue-comment.md
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          if [ -f submission_result.json ] && [ "$(python -c 'import json; print(str(json.load(open("submission_result.json", encoding="utf-8")).get("close_issue", False)).lower())')" = "true" ]; then
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
          fi

      - name: Create or update pull request
        if: ${{ success() && (github.event_name != 'issue_comment' || (github.event.comment.body != '/force-review' && !startsWith(github.event.comment.body, '/force-review ')) || steps.force_auth.outputs.authorized == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="$(python -c 'import json; print(json.load(open("submission_result.json", encoding="utf-8"))["branch"])')"
          PR_TITLE="$(cat pr_title.txt)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add achievement-library/README.md achievement-library/README_EN.md achievement-library/index.json achievement-library/files
          if git diff --cached --quiet; then
            echo "No library changes to commit."
          else
            git commit -m "data: add achievement translations from issue $ISSUE_NUMBER"
            git push --set-upstream origin "$BRANCH"
          fi
          PR_URL="$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create --title "$PR_TITLE" --body-file pr_body.md --base main --head "$BRANCH")"
          else
            gh pr edit "$PR_URL" --title "$PR_TITLE" --body-file pr_body.md
          fi
          printf "%s\n" "$PR_URL" > pr_url.txt
          python - <<'PY' > issue-comment.md
          import json
          from pathlib import Path
          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          pr_url = Path("pr_url.txt").read_text(encoding="utf-8").strip()
          print(f"Congratulations, and thank you for contributing achievement translations for {data['game_name']} ({data['game_id']}).")
          print()
          print("Automatic first review passed. A pull request is ready for maintainer review:")
          print(pr_url)
          PY
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          gh issue close "$ISSUE_NUMBER" --reason "completed"

  merge-approved:
    if: ${{ github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'translation-library/issue-') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Thank contributor and merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          SOURCE_ISSUE="$(python - <<'PY'
          import os
          import re
          body = os.environ.get("PR_BODY", "")
          match = re.search(r"/issues/(\d+)", body)
          print(match.group(1) if match else "")
          PY
          )"
          if [ -n "$SOURCE_ISSUE" ]; then
            CONTRIBUTOR="$(gh issue view "$SOURCE_ISSUE" --json author --jq '.author.login')"
            printf "Thank you @%s for contributing to the achievement translation library. The maintainer approved the review PR, so the bot will merge it now.\n" "$CONTRIBUTOR" > thanks.md
            gh issue comment "$SOURCE_ISSUE" --body-file thanks.md
            gh pr comment "$PR_NUMBER" --body-file thanks.md
          else
            printf "Thank you for contributing to the achievement translation library. The maintainer approved this PR, so the bot will merge it now.\n" > thanks.md
            gh pr comment "$PR_NUMBER" --body-file thanks.md
          fi
          gh pr merge "$PR_NUMBER" --squash --delete-branch
