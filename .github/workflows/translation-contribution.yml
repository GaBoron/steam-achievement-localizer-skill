name: Translation contribution review

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - reopened
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - closed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-guard:
    if: ${{ (github.event_name == 'issues' && !github.event.issue.pull_request) || (github.event_name == 'issue_comment' && !github.event.issue.pull_request && (github.event.comment.body == '/rerun-checks' || startsWith(github.event.comment.body, '/rerun-checks ')) && (contains(github.event.issue.labels.*.name, 'translation-contribution') || startsWith(github.event.issue.title, '[Translation contribution]') || (contains(github.event.issue.body, '### Steam app ID') && (contains(github.event.issue.body, '### Achievement schema ZIP') || contains(github.event.issue.body, '### 成就 schema ZIP'))))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply issue labels and freeze translation submissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python workflow-scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mode guard

  review:
    needs: issue-guard
    if: ${{ always() && ((github.event_name == 'issues' && github.event.action != 'edited' && github.event.action != 'labeled' && !github.event.issue.pull_request && (contains(github.event.issue.labels.*.name, 'translation-contribution') || startsWith(github.event.issue.title, '[Translation contribution]') || (contains(github.event.issue.body, '### Steam app ID') && (contains(github.event.issue.body, '### Achievement schema ZIP') || contains(github.event.issue.body, '### 成就 schema ZIP'))))) || (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'translation-contribution' && !github.event.issue.pull_request) || (github.event_name == 'issue_comment' && !github.event.issue.pull_request && (contains(github.event.issue.labels.*.name, 'translation-contribution') || startsWith(github.event.issue.title, '[Translation contribution]') || (contains(github.event.issue.body, '### Steam app ID') && (contains(github.event.issue.body, '### Achievement schema ZIP') || contains(github.event.issue.body, '### 成就 schema ZIP')))) && (startsWith(github.event.comment.body, '/update ') || github.event.comment.body == '/force-review' || startsWith(github.event.comment.body, '/force-review ') || github.event.comment.body == '/rerun-checks' || startsWith(github.event.comment.body, '/rerun-checks ')))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Authorize maintainer override command
        id: force_auth
        if: ${{ github.event_name == 'issue_comment' && (github.event.comment.body == '/force-review' || startsWith(github.event.comment.body, '/force-review ')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python workflow-scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mode require-maintainer-command --command /force-review

      - name: Authorize rerun command
        id: rerun_auth
        if: ${{ github.event_name == 'issue_comment' && (github.event.comment.body == '/rerun-checks' || startsWith(github.event.comment.body, '/rerun-checks ')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python workflow-scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mode require-maintainer-command --command /rerun-checks

      - name: Prepare submission branch
        if: ${{ github.event_name != 'issue_comment' || startsWith(github.event.comment.body, '/update ') || steps.force_auth.outputs.authorized == 'true' || steps.rerun_auth.outputs.authorized == 'true' }}
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="translation-library/issue-$ISSUE_NUMBER"
          git fetch origin main
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH" "origin/main"

      - name: Validate submission and update library files
        id: validate
        if: ${{ github.event_name != 'issue_comment' || startsWith(github.event.comment.body, '/update ') || steps.force_auth.outputs.authorized == 'true' || steps.rerun_auth.outputs.authorized == 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python workflow-scripts/library_submission_bot.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN"

      - name: Comment on failed review
        if: ${{ steps.validate.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -f submission_result.json ]; then
            python - <<'PY' > issue-comment.md
          import json
          from pathlib import Path
          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          if data.get("retry_allowed"):
              print("自动初审发现了可以通过替换文件修复的问题。\n")
              print("Automatic first review found a file problem that can be updated.\n")
          else:
              print("自动初审无法继续，此 issue 将被关闭。\n")
              print("Automatic first review cannot continue, so this issue will be closed.\n")
          print("检查详情 / Review details:")
          for item in data.get("errors", []):
              print(f"- {item}")
          warnings = data.get("warnings", [])
          if warnings:
              print("\n警告 / Warnings:")
              for item in warnings:
                  print(f"- {item}")
          if data.get("retry_allowed"):
              print("\n原 issue 标题和正文在提交后已冻结，但评论仍开放。要替换上传文件，请在新评论中附上修正后的 ZIP，并写 `/update <附件链接>`。")
              print("\nThe original issue title and body are frozen after submission, but comments remain open. To replace the uploaded file, attach the corrected ZIP in a new comment and write `/update <attachment link>`.")
          PY
          else
            {
              printf "自动初审失败，但没有生成详细报告。\n\n"
              printf "Automatic first review failed before a detailed report was created.\n"
            } > issue-comment.md
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          if [ -f submission_result.json ] && [ "$(python -c 'import json; print(str(json.load(open("submission_result.json", encoding="utf-8")).get("close_issue", False)).lower())')" = "true" ]; then
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
          fi

      - name: Create or update pull request
        if: ${{ steps.validate.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="$(python -c 'import json; print(json.load(open("submission_result.json", encoding="utf-8"))["branch"])')"
          PR_TITLE="$(cat pr_title.txt)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add achievement-library/files
          if git diff --cached --quiet; then
            echo "No library changes to commit."
          else
            git commit -m "data: add achievement translations from issue $ISSUE_NUMBER"
            git push --force-with-lease --set-upstream origin "$BRANCH"
          fi
          PR_URL="$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')"
          if [ -z "$PR_URL" ]; then
            set +e
            PR_CREATE_OUTPUT="$(gh pr create --title "$PR_TITLE" --body-file pr_body.md --base main --head "$BRANCH" 2>&1)"
            PR_CREATE_STATUS=$?
            set -e
            if [ "$PR_CREATE_STATUS" -ne 0 ]; then
              {
                printf "自动初审已通过，投稿分支也已推送，但机器人无法创建 PR。\n\n"
                printf "Automatic first review passed and the submission branch was pushed, but the bot could not create the pull request.\n\n"
                printf "Branch: \`%s\`\n" "$BRANCH"
                printf "Manual PR URL: https://github.com/%s/compare/main...%s?expand=1\n\n" "$GITHUB_REPOSITORY" "$BRANCH"
                printf "GitHub returned:\n\n\`\`\`text\n%s\n\`\`\`\n\n" "$PR_CREATE_OUTPUT"
                printf "如果错误提示 GitHub Actions 不允许创建 PR，请开启仓库设置：Settings -> Actions -> General -> Workflow permissions -> Allow GitHub Actions to create and approve pull requests。\n\n"
                printf "If the error says GitHub Actions is not permitted to create pull requests, enable repository setting: Settings -> Actions -> General -> Workflow permissions -> Allow GitHub Actions to create and approve pull requests.\n"
              } > issue-comment.md
              gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
              exit 0
            fi
            PR_URL="$PR_CREATE_OUTPUT"
          else
            gh pr edit "$PR_URL" --title "$PR_TITLE" --body-file pr_body.md
          fi
          printf "%s\n" "$PR_URL" > pr_url.txt
          python - <<'PY' > issue-comment.md
          import json
          from pathlib import Path
          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          pr_url = Path("pr_url.txt").read_text(encoding="utf-8").strip()
          print(f"恭喜，感谢你为 {data['game_name']} ({data['game_id']}) 贡献成就翻译。")
          print(f"Congratulations, and thank you for contributing achievement translations for {data['game_name']} ({data['game_id']}).")
          print()
          print("自动初审已通过，PR 已准备好等待维护者审核：")
          print("Automatic first review passed. A pull request is ready for maintainer review:")
          print(pr_url)
          PY
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          gh issue close "$ISSUE_NUMBER" --reason "completed"

  merge-approved:
    if: ${{ github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'translation-library/issue-') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Merge approved PR and run post-merge maintenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          python workflow-scripts/translation_pr_maintenance.py --repo "$GITHUB_REPOSITORY" --token "$GH_TOKEN" --merged-pr "$PR_NUMBER" --update-index --thank --delete-branch

  pr-update:
    if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/update ') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh translation PR from update attachment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python workflow-scripts/translation_pr_maintenance.py --repo "$GITHUB_REPOSITORY" --token "$GH_TOKEN" --event "$GITHUB_EVENT_PATH" --pr-update

  post-merge-maintenance:
    if: ${{ github.actor != 'github-actions[bot]' && github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'translation-library/issue-') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update library index, thank contributor, and delete PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python workflow-scripts/translation_pr_maintenance.py --repo "$GITHUB_REPOSITORY" --token "$GH_TOKEN" --merged-pr "$PR_NUMBER" --update-index --thank --delete-branch
